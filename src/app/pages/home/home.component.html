<div class="app-page-root home-root">
    <!-- Hero Section -->
    <div class="hero" responsive>
        <div class="hero-glow"></div>

        <div class="hero-tag">
            <span class="tag-line"></span>
            // KSHS &middot; Kenyan Digital Shilling &middot; Live
        </div>

        <h1>
            <span class="solid">KAKI</span><span class="outline">TU</span><br />
            <span class="outline">NET</span><span class="solid">WORK</span>
        </h1>

        <p class="hero-desc">
            A transparent, real-time window into the Kakitu network. Explore blocks,
            accounts, and transactions on Kenya's digital shilling infrastructure.
        </p>

        <div class="hero-search" responsive>
            <mat-form-field appearance="outline">
                <mat-label>Address or Hash</mat-label>
                <input
                    matInput
                    autocomplete="off"
                    (focus)="touchedIdField = true; idFieldActive = true"
                    (blur)="idFieldActive = false"
                    [formControl]="searchFormControl"
                    (keyup.enter)="search(searchFormControl.value, $event)"
                />
            </mat-form-field>
            <button
                responsive
                class="hero-search-button"
                mat-flat-button
                color="accent"
                [disabled]="loading || !searchFormControl.value"
                (click)="search(searchFormControl.value, $event)"
            >
                <div [class.home-loading]="loading">
                    <mat-spinner *ngIf="loading" [diameter]="18" [style.marginRight.px]="16"></mat-spinner>
                    Search
                </div>
            </button>
        </div>

        <div class="ticker">
            <div class="tick">
                <div class="tick-val">~2s</div>
                <div class="tick-lbl">Confirmation</div>
            </div>
            <div class="tick">
                <div class="tick-val">0</div>
                <div class="tick-lbl">Fee</div>
            </div>
            <div class="tick">
                <div class="tick-val">Live</div>
                <div class="tick-lbl">Blocks</div>
            </div>
            <div class="tick">
                <div class="tick-val">KSHS</div>
                <div class="tick-lbl">Reserve</div>
            </div>
        </div>
    </div>
</div>

<div class="waves-section">
    <app-wave
        *ngIf="!vp.sm"
        [darkThemeWaveNumber]="1"
        [lightThemeWaveNumber]="1"
        [bottom]="-100"
        maxHeight="750"
    ></app-wave>
    <img *ngIf="vp.sm" style="margin-top: -200px" height="200" src="assets/waves/wave1.svg" />
</div>
